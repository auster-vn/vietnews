name: VietNews CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"

      - name: Sync dependencies
        run: |
          cd backend
          uv sync

      - name: Run Pytest
        run: |
          cd backend
          PYTHONPATH=.. uv run pytest tests/ -v

  renderer-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd renderer
          npm install

      - name: Download font assets
        run: |
          cd renderer
          mkdir -p fonts
          curl -L -o fonts/Inter-Regular.ttf https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-400-normal.ttf
          curl -L -o fonts/Inter-Bold.ttf https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-700-normal.ttf

      - name: Run Vitest
        run: |
          cd renderer
          npm run test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run Vitest
        run: |
          cd frontend
          npm run test
